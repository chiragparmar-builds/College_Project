<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Resume Builder</title>
</head>
<body>
    <section class="theme-page theme-signin">
        <div class="theme-card">
            <img class="d-block mx-auto mb-3" th:src="@{/image/resumebuilder-logo.svg}" alt="" width="48" height="48">
            <h1>Sign in</h1>
            <form th:action="@{/do_Login}" method="post" class="theme-form">
                <div class="form-floating form-group">
                    <input type="email" name="username" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                    <label for="floatingInput">Email address</label>
                </div>
                <div class="form-floating form-group">
                    <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                    <label for="floatingPassword">Password</label>
                </div>
                <button class="btn-theme-primary w-100 mb-3" type="submit">Sign in</button>
                <div>
                    <a th:href="@{/forgot_password}" class="btn-theme-secondary">Forgot password?</a>
                </div>
            </form>
        </div>
    </section>
    <script th:if="${Loginfail}">
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: "Oops",
                    text: "Wrong email or password.",
                    icon: "error",
                    allowOutsideClick: false
                }).then(function(result) {
                    if (result.isConfirmed) {
                        window.location.href = "/Login";
                    }
                });
            }
        });
    </script>
</body>
</html>
