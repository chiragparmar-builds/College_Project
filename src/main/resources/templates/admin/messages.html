<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base::layout(~{::section})}">

<body>

<section>

    <!-- TITLE -->
    <h3 class="page-title">Messages</h3>

    <!-- TABLE -->
    <div class="table-container">

        <table class="custom-table">

            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>View</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="c : ${contact}">
                <td th:text="${c.name}">John</td>
                <td th:text="${c.email}">john@gmail.com</td>
                <td th:text="${c.phone}">9999999999</td>


                <td>
                    <!-- VIEW -->
                    <button type="button"
                            class="view-btn"
                            th:attr="data-id=${c.cid}"
                            onclick="showMessage(this)">
                        <i class="fas fa-eye"></i>
                    </button>

                    <!-- DELETE -->
                    <button type="button"
                            class="delete-btn"
                            th:attr="data-id=${c.cid}"
                            onclick="deleteMessage(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>

            </tbody>

        </table>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        function showMessage(btn) {

            let id = btn.getAttribute("data-id");

            fetch("/admin/get-message?id=" + id)
                .then(response => response.text())
                .then(data => {

                    Swal.fire({
                        title: "📩 Message",
                        html: `<p style="font-size:14px">${data}</p>`,
                        confirmButtonText: "Close",
                        confirmButtonColor: "#c19a6b",
                        background: "#1e293b",
                        color: "#fff",
                        width: "500px"
                    });

                })
                .catch(error => {
                    console.error(error);
                });
        }


        function deleteMessage(btn) {

    let id = btn.getAttribute("data-id");

    Swal.fire({
        title: "Are you sure?",
        text: "This message will be deleted permanently!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#c19a6b",
        cancelButtonColor: "#ef4444",
        confirmButtonText: "Yes, delete it!"
    }).then((result) => {

        if (result.isConfirmed) {

            fetch("/admin/delete-message?id=" + id)
                .then(response => response.text())
                .then(data => {

                    if (data === "success") {

                        Swal.fire({
                            title: "Deleted!",
                            text: "Message has been removed.",
                            icon: "success",
                            confirmButtonColor: "#c19a6b"
                        });

                        // REMOVE ROW WITHOUT RELOAD
                        let row = btn.closest("tr");
                        row.remove();
                    }

                });

        }

    });

}
    </script>
</section>

<!-- SWEET ALERT -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



</body>
</html>
