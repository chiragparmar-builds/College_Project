<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base::layout(~{::section})}">

<body>

<section>

    <!-- TITLE -->
    <h3 class="page-title">User Management</h3>

    <!-- STATS -->
    <div class="stats-box">
        <p>Total Users</p>
        <h2 th:text="${Total_Users}">50</h2>
    </div>

    <!-- TABLE -->
    <div class="table-container">

        <table class="custom-table">

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="a : ${users}">
                <td th:text="${a.id}">1</td>
                <td th:text="${a.name}">John</td>
                <td th:text="${a.email}">john@gmail.com</td>

                <td>
                        <span class="role"
                              th:text="${a.role eq 'ROLE_ADMIN' ? 'ADMIN' : 'USER'}">
                        </span>
                </td>

                <td>

                    <!-- VIEW -->
                    <button type="button"
                            class="view-btn"
                            th:attr="data-id=${a.id}"
                            onclick="viewUser(this)">
                        <i class="fas fa-eye"></i>
                    </button>

                    <!-- DELETE -->
                    <button type="button"
                            class="delete-btn"
                            th:attr="data-id=${a.id}"
                            onclick="deleteUser(this)">
                        <i class="fas fa-trash"></i>
                    </button>

                </td>
            </tr>

            </tbody>

        </table>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        function deleteUser(btn) {

            let id = btn.getAttribute("data-id");

            Swal.fire({
                title: "Are you sure?",
                text: "User will be permanently deleted!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#c19a6b",
                cancelButtonColor: "#ef4444",
                confirmButtonText: "Yes, delete"
            }).then((result) => {

                if (result.isConfirmed) {

                    fetch("/admin/delete-user?id=" + id)
                        .then(response => response.text())
                        .then(data => {

                            if (data === "success") {

                                Swal.fire({
                                    title: "Deleted!",
                                    text: "User removed successfully",
                                    icon: "success",
                                    confirmButtonColor: "#c19a6b"
                                });

                                // REMOVE ROW
                                let row = btn.closest("tr");
                                row.remove();
                            }

                        });

                }

            });

        }

        function viewUser(btn) {

            let id = btn.getAttribute("data-id");

            fetch("/admin/get-user?id=" + id)
                .then(response => response.json())
                .then(data => {

                    Swal.fire({
                        title: "👤 User Details",
                        html: `
                            <div style="text-align:left">
                                <p><b>Name:</b> ${data.name}</p>
                                <p><b>Email:</b> ${data.email}</p>
                                <p><b>Role:</b> ${data.role}</p>
                            </div>
                        `,
                        confirmButtonColor: "#c19a6b",
                        background: "#1e293b",
                        color: "#fff"
                    });

                });

        }

    </script>
</section>

</body>
</html>
