<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Resume Builder</title>
</head>
<body>
    <section class="theme-page">
        <header class="theme-page__hero">
            <h1>Contact Us</h1>
            <p>Get in touch — we’d love to hear from you</p>
        </header>
        <div class="theme-page__inner">
            <div class="theme-contact__grid">
                <div class="theme-contact__form">
                    <div class="theme-card">
                        <h2>Send a message</h2>
                        <form th:action="@{/do_message}" method="post" th:object="${contact}" class="theme-form">
                            <div class="form-group">
                                <label for="contactName">Name</label>
                                <input type="text" id="contactName" name="name" class="form-control" th:value="${contact.name}"
                                    th:classappend="${#fields.hasErrors('name')?'is-invalid':''}" required>
                                <div class="invalid-feedback" th:each="e : ${#fields.errors('name')}" th:text="${e}"></div>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" class="form-control" th:value="${contact.email}"
                                    th:classappend="${#fields.hasErrors('email')?'is-invalid':''}" required>
                                <div class="invalid-feedback" th:each="e : ${#fields.errors('email')}" th:text="${e}"></div>
                            </div>
                            <div class="form-group">
                                <label for="Phone">Phone</label>
                                <input type="number" id="Phone" name="Phone" class="form-control" th:value="${contact.phone}"
                                    th:classappend="${#fields.hasErrors('phone')?'is-invalid':''}" required>
                                <div class="invalid-feedback" th:each="e : ${#fields.errors('phone')}" th:text="${e}"></div>
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" rows="4" class="form-control" th:text="${contact.message}" required></textarea>
                            </div>
                            <button type="submit" class="btn-theme-primary">Submit</button>
                        </form>
                    </div>
                </div>
                <div class="theme-contact__map">
                    <div class="theme-card">
                        <h2>Our location</h2>
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3733.197195238243!2d72.37324807487789!3d23.11303147742989!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395976398552d5d7%3A0x395976398552d5d7!2sKadi%2C%20Gujarat%2C%20India!5e0!3m2!1sen!2sin!4v1695477989193!5m2!1sen!2sin"
                            allowfullscreen="" loading="lazy" title="Map location"></iframe>
                    </div>
                </div>
            </div>
        </div>
        <script th:if="${message_from_user}">
            document.addEventListener('DOMContentLoaded', function() {
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        title: "Success",
                        text: "Message sent successfully!",
                        icon: "success",
                        allowOutsideClick: false
                    }).then(function(result) {
                        if (result.isConfirmed) {
                            window.location.href = "/ContactUs";
                        }
                    });
                }
            });
        </script>
    </section>
</body>
</html>
