<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Resume Builder</title>
</head>
<body>
    <section class="theme-page">
        <header class="theme-page__hero">
            <h1>Create your account</h1>
            <p>Join Resume Builder and start building your resume in minutes</p>
        </header>
        <div class="theme-page__inner">
            <div class="theme-card">
                <form th:action="@{/do_register}" method="post" th:object="${user}" class="theme-form">
                    <div class="form-group">
                        <label for="nameInput">Full name</label>
                        <input type="text" class="form-control" id="nameInput" name="name" placeholder="Enter full name" required
                            th:value="${user.name}" th:classappend="${#fields.hasErrors('name')?'is-invalid':''}">
                        <div class="invalid-feedback" th:each="e : ${#fields.errors('name')}" th:text="${e}"></div>
                    </div>
                    <div class="form-group">
                        <label for="emailInput">Email</label>
                        <input type="email" class="form-control" id="emailInput" name="email" placeholder="Email address" required
                            th:value="${user.email}" th:classappend="${#fields.hasErrors('email')?'is-invalid':''}">
                        <div class="invalid-feedback" th:each="e : ${#fields.errors('email')}" th:text="${e}"></div>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="Gender" id="inlineRadio1" value="Male" required>
                                <label class="form-check-label" for="inlineRadio1">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="Gender" id="inlineRadio2" value="Female" required>
                                <label class="form-check-label" for="inlineRadio2">Female</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="Gender" id="inlineRadio3" value="Other" required>
                                <label class="form-check-label" for="inlineRadio3">Other</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="dobInput">Date of birth</label>
                        <input type="date" class="form-control" id="dobInput" name="dob" required th:value="${user.dob}">
                    </div>
                    <div class="form-group">
                        <label for="passwordInput">Password</label>
                        <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Create password" required
                            th:value="${user.password}" th:classappend="${#fields.hasErrors('password')?'is-invalid':''}">
                        <div class="invalid-feedback" th:each="e : ${#fields.errors('password')}" th:text="${e}"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPasswordInput">Confirm password</label>
                        <input type="password" class="form-control" id="confirmPasswordInput" name="Confirm_Password" placeholder="Confirm password" required
                            th:classappend="${Confirm_Password_Message} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${Confirm_Password_Message}">Passwords do not match.</div>
                    </div>
                    <div class="form-group">
                        <label for="aboutInput">About you</label>
                        <textarea class="form-control" id="aboutInput" name="about" rows="4" placeholder="Tell us a bit about yourself" required th:text="${user.about}"></textarea>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn-theme-primary">Create account</button>
                        <button type="reset" class="btn-theme-secondary" onclick="window.location.href='/SingUp'">Reset</button>
                    </div>
                </form>
            </div>
        </div>
        <!-- Success Alert -->
        <script th:if="${successMessage}">
            document.addEventListener("DOMContentLoaded", function () {
                Swal.fire({
                    icon: "success",
                    title: "Account Created",
                    text: "Your account has been created successfully!",
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonText: "OK"
                }).then(() => {
                    window.location.href = "/Login";
                });
            });
        </script>

        <!-- Email Already Exists Alert -->
        <script th:if="${errorMessage}">
            document.addEventListener("DOMContentLoaded", function () {
                Swal.fire({
                    icon: "warning",
                    title: "Email Already Registered",
                    text: "An account with this email already exists.",
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonText: "OK"
                }).then(() => {
                    window.location.href = "/SingUp";
                });
            });
        </script>
    </section>
</body>
</html>
