<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Resume Builder</title>
</head>
<body>
    <section class="theme-page theme-signin">
        <div class="theme-card">
            <h1>Forgot password</h1>
            <p class="text-muted mb-4">Enter your email and we’ll send you a link to reset your password.</p>
            <form th:action="@{/email/sendmail}" method="post" th:object="${forgotemail}" class="theme-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" name="form" placeholder="Enter your email" required th:value="${forgotemail.form}">
                </div>
                <button type="submit" class="btn-theme-primary w-100 mb-3">Send OTP</button>
                <div class="text-center">
                    <a th:href="@{Login}" class="btn-theme-secondary">Back to login</a>
                </div>
            </form>
        </div>
    </section>
    <script th:if="${User_Not_Exist}">
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: "Oops",
                    text: "No account found with this email. Please sign up first.",
                    icon: "error",
                    allowOutsideClick: false
                }).then(function(result) {
                    if (result.isConfirmed) {
                        window.location.href = "/SingUp";
                    }
                });
            }
        });
    </script>
</body>
</html>
