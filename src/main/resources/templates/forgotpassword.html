<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .forgot-password-container {
            max-width: 500px;
            margin: 150px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="forgot-password-container">
        <h2 class="text-center">Forgot Password</h2>
        <p class="text-center">Enter your email address to reset your password.</p>
        <form th:action="@{/email/sendmail}" method="post" th:object="${forgotemail}">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control" th:value="${forgotemail.form}" name="form" id="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Send OTP</button>
        </form>
        <div class="text-center mt-3">
            <a th:href="@{Login}">Back to Login</a>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies (optional) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:if="${User_Not_Exist}">
        Swal.fire({
            title: "Oops",
            text: "User Not Exist Try to Register",
            icon: "error",
            allowOutsideClick: false
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/SingUp";
            }
        });
    </script>
