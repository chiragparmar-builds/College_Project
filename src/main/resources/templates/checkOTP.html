<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Resume Builder</title>
</head>
<body>
    <section class="theme-page theme-signin">
        <div class="theme-card">
            <h1>Verify email</h1>
            <p class="text-muted mb-4">Enter the OTP we sent to your email to reset your password.</p>
            <form th:action="@{/email/CheckOtpDemo}" method="post" th:object="${forgotemail}" class="theme-form">
                <div class="form-group">
                    <label for="staticEmail">Email</label>
                    <input type="text" readonly class="form-control" id="staticEmail" name="form" th:value="${forgotemail.form}">
                </div>
                <div class="form-group">
                    <label for="inputOtp">OTP</label>
                    <input type="number" class="form-control" id="inputOtp" name="OTP" placeholder="Enter OTP" required>
                </div>
                <button type="submit" class="btn-theme-primary w-100 mb-3">Verify</button>
                <div class="text-center">
                    <a th:href="@{Login}" class="btn-theme-secondary">Back to login</a>
                </div>
            </form>
        </div>
    </section>
    <script th:if="${InCorrect_otp}">
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: "Oops",
                    text: "Incorrect OTP. Please try again.",
                    icon: "error",
                    allowOutsideClick: false
                });
            }
        });
    </script>
    <script th:if="${Correct_otp}">
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: "Success",
                    text: "OTP verified successfully.",
                    icon: "success",
                    allowOutsideClick: false
                });
            }
        });
    </script>
</body>
</html>
